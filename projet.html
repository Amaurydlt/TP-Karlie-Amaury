<!DOCTYPE html>
<html>
    <head>
        <title>StockMaster</title>
        <style>
            .promo {
            color: red;
            font-weight: bold;
            }
        </style>
    </head>
    <body>
        <h1>Gestion de Stock <h1>
        <div id="app">
        </div>
        <script>

            // apiService Une fonction qui récupère les données (fetch).

        const apiService = {

            async getProduits() {
                return new Promise(resolve => {
                    setTimeout(() => {
                        resolve([
                            { nom: "TV LED", prix: 400, cat: "Electronique" },
                            { nom: "Micro-onde", prix: 120, cat: "Electromenager" },
                            { nom: "Smartphone", prix: 800, cat: "Electronique" },
                            { nom: "Lave-linge", prix: 300, cat: "Electromenager" },
                            { nom: "Ventilateur", prix: 235, cat: "Promotion" },
                            { nom: "Tabouret", prix: 199, cat: "Promotion" },

                        ]);
                    }, 1000);
                });
            }, 

            async getProduitsParCategorie(categorie) {
                const produits = await this.getProduits();
                return produits.filter(p => p.cat === categorie);
            }
        };


                    // uiManager  Une fonction qui prend les données et les affiche. (DOM)

        const uiManager = {
            afficherProduits(produits) {
                const container = document.getElementById("app");
                container.innerHTML = "";

                produits.forEach(p => {
                    const item = document.createElement("div");

                    if (p.cat === "Promotion") {
                        item.innerHTML = "Produit: " + p.nom + 
                                        "  Prix: <span class='promo'>" + p.prix + "€ (PROMO)</span>";
                    } 
                    else {
                        item.textContent = "Produit: " + p.nom + "  Prix: " + p.prix + "€";
                    }

                    container.appendChild(item);
                });
            }
        };



            async function updateEverything() {
                const produits = await apiService.getProduitsParCategorie("Promotion");
                uiManager.afficherProduits(produits);
        }

        updateEverything();

        </script>
    </body>
</html>
